- name: Sync and Push Server Snapshot
  env:
    HF_TOKEN: ${{ secrets.HF_TOKEN }}
  run: |
    set -euo pipefail
    export GIT_TERMINAL_PROMPT=0

    HF_TOKEN_CLEAN="$(printf '%s' "$HF_TOKEN" | tr -d '\r\n')"
    if [ -z "${HF_TOKEN_CLEAN}" ]; then
      echo "HF_TOKEN is empty. Please set secrets.HF_TOKEN in the repo settings."
      exit 1
    fi

    HF_REPO="huggingface.co/spaces/VeridianThesis/ResumeScreeningSRC"
    HF_REPO_URL="https://user:${HF_TOKEN_CLEAN}@${HF_REPO}"

    git remote add hf "$HF_REPO_URL" 2>/dev/null || git remote set-url hf "$HF_REPO_URL"

    # Create a clean snapshot branch from server/ only (no history)
    rm -rf /tmp/hf-space
    mkdir -p /tmp/hf-space
    rsync -a --delete server/ /tmp/hf-space/

    cd /tmp/hf-space
    git init
    git config user.name "github-actions[bot]"
    git config user.email "github-actions[bot]@users.noreply.github.com"

    git lfs install

    # Optional: keep .gitattributes if you need LFS for anything (but you probably don't for Spaces)
    git add -A
    git commit -m "Sync from GitHub ${GITHUB_SHA}"

    git branch -M main
    git remote add hf "$HF_REPO_URL"
    git push --force hf main