name: Sync Backend to Hugging Face

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync and Push Server Subtree
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          HF_URL="https://VeridianThesis:${HF_TOKEN}@huggingface.co/spaces/VeridianThesis/ResumeScreeningSRC"

          # Add HF remote (idempotent)
          git remote add hf "$HF_URL" 2>/dev/null || true

          # Fetch remote branch if it exists (don't fail if it's empty/new)
          git fetch hf main || true

          # Create a commit that contains ONLY the server/ directory as the repo root
          SPLIT_SHA="$(git subtree split --prefix server)"

          # Force update Hugging Face main to match server/ exactly
          git push --force hf "${SPLIT_SHA}:refs/heads/main"