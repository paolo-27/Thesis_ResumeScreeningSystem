name: Sync Backend to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync and Push Server Snapshot (exclude model artifacts)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          HF_TOKEN_CLEAN="$(printf '%s' "${HF_TOKEN:-}" | tr -d '\r\n')"
          if [ -z "${HF_TOKEN_CLEAN}" ]; then
            echo "HF_TOKEN is empty. Please set secrets.HF_TOKEN in the repo settings."
            exit 1
          fi

          HF_REPO="huggingface.co/spaces/VeridianThesis/ResumeScreeningSRC"
          HF_REPO_URL="https://user:${HF_TOKEN_CLEAN}@${HF_REPO}"

          rm -rf /tmp/hf-space
          mkdir -p /tmp/hf-space

          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.gitattributes' \
            --exclude 'model/***' \
            --exclude '*.pkl' \
            --exclude '*.joblib' \
            --exclude '*.pt' \
            --exclude '*.bin' \
            --exclude '*.onnx' \
            server/ /tmp/hf-space/

          cd /tmp/hf-space
          echo "Fail-fast check for forbidden artifacts:"
          forbidden="$(find . -type f \( -name '*.pkl' -o -name '*.joblib' -o -name '*.pt' -o -name '*.bin' -o -name '*.onnx' \) -print || true)"
          if [ -n "$forbidden" ]; then
            echo "ERROR: forbidden artifacts detected in snapshot:"
            echo "$forbidden"
            exit 1
          fi
          echo "Largest files in snapshot:"
          find . -type f -printf '%s\t%p\n' | sort -nr | head -n 20

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Sync from GitHub ${GITHUB_SHA}"

          git branch -M main
          git remote add hf "$HF_REPO_URL"
          git push --force hf main