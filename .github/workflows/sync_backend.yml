name: Sync Backend to Hugging Face
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync and Push Server Subtree
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          HF_URL="https://VeridianThesis:${HF_TOKEN}@huggingface.co/spaces/VeridianThesis/ResumeScreeningSRC"

          # Ensure we have the remote state locally so push is fast-forward
          git remote add hf "$HF_URL" || true
          git fetch hf main

          # Integrate remote changes (prevents "fetch first" rejection)
          git merge --no-edit --allow-unrelated-histories hf/main || true

          # Now push subtree
          git subtree push --prefix server "$HF_URL" main