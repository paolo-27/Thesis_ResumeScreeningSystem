- name: Push Server Subtree
  env:
    HF_TOKEN: ${{ secrets.HF_TOKEN }}
  run: |
    set -euo pipefail

    HF_URL="https://VeridianThesis:${HF_TOKEN}@huggingface.co/spaces/VeridianThesis/ResumeScreeningSRC"

    # Ensure we have an up-to-date view of the remote branch
    git remote remove hf 2>/dev/null || true
    git remote add hf "$HF_URL"
    git fetch hf main

    # Integrate remote changes so the push can fast-forward
    git rebase hf/main

    # Now push only the server/ folder as the Space root
    git subtree push --prefix server "$HF_URL" main