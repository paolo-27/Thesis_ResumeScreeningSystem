name: Sync Backend to Hugging Face
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Required for subtree to work correctly

      - name: Push Server Subtree
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          HF_URL="https://VeridianThesis:${HF_TOKEN}@huggingface.co/spaces/VeridianThesis/ResumeScreeningSRC"

          # Push only the server/ folder as the Space root.
          # Force is needed to avoid "rejected (fetch first)" when the remote has commits not in this repo.
          git subtree push --prefix server "$HF_URL" main --force