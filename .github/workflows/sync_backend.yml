name: Sync Backend to Hugging Face
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Sync and Push Server Subtree
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          # Trim possible trailing newline/carriage return from the secret
          HF_TOKEN_CLEAN="$(printf '%s' "$HF_TOKEN" | tr -d '\r\n')"

          HF_REPO_URL="https://huggingface.co/spaces/VeridianThesis/ResumeScreeningSRC"

          # Add HF remote without credentials in the URL
          git remote add hf "$HF_REPO_URL" 2>/dev/null || git remote set-url hf "$HF_REPO_URL"

          # Create a temporary commit of just the server/ folder
          # This makes 'server' the root of the Hugging Face Space
          SPLIT_SHA=$(git subtree split --prefix server main)

          # Authenticate via header (avoid token-in-url parsing issues)
          git -c http.extraHeader="Authorization: Bearer ${HF_TOKEN_CLEAN}" \
            push --force hf "${SPLIT_SHA}:refs/heads/main"